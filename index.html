<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poe Claude Chat</title>

  <!-- ✅ Markdown 解析库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f2f7;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      text-align: center;
      padding: 12px;
      font-weight: 600;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 85%;
      padding: 12px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #007aff;
      color: white;
    }

    .assistant {
      align-self: flex-start;
      background: white;
      color: black;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: white;
      border-top: 1px solid #ddd;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 0 16px;
      border-radius: 12px;
      font-size: 15px;
    }

    /* ✅ Markdown 样式优化 */
    .assistant pre {
      background: #1e1e1e;
      color: #eee;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .assistant code {
      background: #eee;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
    }

    .assistant h1,
    .assistant h2,
    .assistant h3 {
      margin-top: 10px;
    }

    .assistant ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<header>Claude Sonnet 4.5</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" placeholder="发消息..." rows="1"></textarea>
  <button onclick="send()">发送</button>
</div>

<script>
let conversation = [];

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  conversation.push({ role: "user", content: message });
  renderChat();
  input.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();

    conversation.push({
      role: "assistant",
      content: data.reply
    });

    // ✅ 只保留最近 5 轮
    const MAX_MESSAGES = 10;
    if (conversation.length > MAX_MESSAGES) {
      conversation = conversation.slice(-MAX_MESSAGES);
    }

    renderChat();

  } catch (error) {
    alert("网络错误");
  }
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  conversation.forEach(msg => {
    const div = document.createElement("div");
    div.className = "bubble " + msg.role;

    if (msg.role === "assistant") {
      // ✅ Markdown 转 HTML
      div.innerHTML = marked.parse(msg.content);
    } else {
      div.innerText = msg.content;
    }

    chatDiv.appendChild(div);
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ✅ Enter 发送
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>

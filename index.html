<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>TESTAI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --user: #007aff;
  --assistant: #ffffff;
  --bg: #e9ebee;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow: hidden;
}

.container {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-wrapper {
  width: 100%;
  max-width: 720px;
  height: 100%;
  background: white;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.05);
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.7);
  text-align: center;
  padding: 16px 0;
  font-weight: 600;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.bubble {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 18px;
  line-height: 1.6;
  word-wrap: break-word;
  position: relative;
}

.user {
  align-self: flex-end;
  background: var(--user);
  color: white;
  border-bottom-right-radius: 6px;
}

.assistant {
  align-self: flex-start;
  background: #f8f8f8;
  border: 1px solid #eee;
  border-bottom-left-radius: 6px;
}

/* ✅ 三点按钮 */
.menu-btn {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 14px;
  color: #999;
  cursor: pointer;
}

/* ✅ 弹出菜单 */
.menu {
  position: absolute;
  top: 26px;
  right: 8px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  font-size: 14px;
  overflow: hidden;
  z-index: 100;
}

.menu div {
  padding: 8px 12px;
  cursor: pointer;
  white-space: nowrap;
}

.menu div:hover {
  background: #f5f5f5;
}

#inputArea {
  position: sticky;
  bottom: 0;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.8);
  border-top: 1px solid rgba(0,0,0,0.05);
  display: flex;
  padding: 14px;
  gap: 8px;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px 12px;
  font-size: 16px;
  border-radius: 14px;
  border: 1px solid #ddd;
  max-height: 150px;
  overflow-y: auto;
  outline: none;
}

button {
  background: var(--user);
  color: white;
  border: none;
  padding: 0 18px;
  border-radius: 14px;
  font-size: 15px;
}

/* thinking */
.thinking {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #888;
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0% { opacity: 0.2; }
  20% { opacity: 1; }
  100% { opacity: 0.2; }
}
</style>
</head>

<body>

<div class="container">
  <div class="chat-wrapper">

    <header>TESTAI</header>

    <div id="chat"></div>

    <div id="inputArea">
      <textarea id="input" placeholder="发消息..." rows="1"></textarea>
      <button onclick="send()">发送</button>
    </div>

  </div>
</div>

<script>
let conversation = [];
let loading = false;
const textarea = document.getElementById("input");

/* ✅ 自动高度 */
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});

/* ✅ 发送 */
async function send() {
  if (loading) return;
  const message = textarea.value.trim();
  if (!message) return;

  conversation.push({ role: "user", content: message });
  textarea.value = "";
  textarea.style.height = "auto";
  renderChat();

  showThinking();
  loading = true;

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();
    removeThinking();

    conversation.push({ role: "assistant", content: data.reply });

    if (conversation.length > 20) {
      conversation = conversation.slice(-20);
    }

    renderChat();
  } catch (err) {
    removeThinking();
    alert("网络错误");
  }

  loading = false;
}

/* ✅ 渲染 */
function renderChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  conversation.forEach((msg, index) => {
    const div = document.createElement("div");
    div.className = "bubble " + msg.role;

    div.innerHTML = msg.role === "assistant"
      ? marked.parse(msg.content)
      : msg.content;

    const menuBtn = document.createElement("div");
    menuBtn.className = "menu-btn";
    menuBtn.innerText = "⋯";
    menuBtn.onclick = (e) => {
      e.stopPropagation();
      showMenu(index, div);
    };

    div.appendChild(menuBtn);
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* ✅ 菜单 */
function showMenu(index, bubble) {
  removeExistingMenu();

  const menu = document.createElement("div");
  menu.className = "menu";

  const copyOne = document.createElement("div");
  copyOne.innerText = "复制此条";
  copyOne.onclick = () => {
    copyText(conversation[index].content);
    removeExistingMenu();
  };

  const copyAll = document.createElement("div");
  copyAll.innerText = "复制全部对话";
  copyAll.onclick = () => {
    const full = conversation
      .map(m => `${m.role === "user" ? "用户" : "AI"}: ${stripHtml(m.content)}`)
      .join("\n\n");
    copyText(full);
    removeExistingMenu();
  };

  const share = document.createElement("div");
  share.innerText = "系统分享";
  share.onclick = () => {
    shareText(conversation[index].content);
    removeExistingMenu();
  };

  menu.appendChild(copyOne);
  menu.appendChild(copyAll);
  menu.appendChild(share);

  bubble.appendChild(menu);
  document.addEventListener("click", removeExistingMenu);
}

function removeExistingMenu() {
  const old = document.querySelector(".menu");
  if (old) old.remove();
}

function stripHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return tmp.innerText;
}

function copyText(text) {
  navigator.clipboard.writeText(stripHtml(text));
  alert("已复制");
}

async function shareText(text) {
  if (navigator.share) {
    await navigator.share({
      title: "TESTAI 对话",
      text: stripHtml(text)
    });
  } else {
    copyText(text);
  }
}

/* ✅ thinking */
function showThinking() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "bubble assistant thinking";
  div.id = "thinking";
  div.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById("thinking");
  if (t) t.remove();
}

textarea.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>

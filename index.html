<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Poe Claude Multi-turn Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 8px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
    #chat {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      white-space: pre-wrap;
    }
    .user {
      color: blue;
      margin-bottom: 6px;
    }
    .assistant {
      color: green;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<h2>Claude Sonnet 4.5 (Multi-turn)</h2>

<textarea id="input" placeholder="输入内容..."></textarea>
<br/>
<button onclick="send()">发送</button>
<button onclick="clearChat()">清空对话</button>

<div id="chat"></div>

<script>
let conversation = [];

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  // ✅ 添加用户消息
  conversation.push({
    role: "user",
    content: message
  });

  // ✅ 只保留最近 5 轮（10 条消息）
  conversation = conversation.slice(-10);

  renderChat();
  input.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();

    if (!response.ok) {
      alert("Error: " + JSON.stringify(data));
      return;
    }

    // ✅ 添加 AI 回复
    conversation.push({
      role: "assistant",
      content: data.reply
    });

    // ✅ 再次裁剪（防止超过 10 条）
    conversation = conversation.slice(-10);

    renderChat();

  } catch (error) {
    alert("Network error");
  }
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  conversation.forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role;
    div.innerText =
      (msg.role === "user" ? "你: " : "Claude: ") + msg.content;
    chatDiv.appendChild(div);
  });
}

function clearChat() {
  conversation = [];
  document.getElementById("chat").innerHTML = "";
}
</script>

</body>
</html>

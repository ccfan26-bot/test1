<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>My AI Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    textarea {
      width: 100%;
      height: 80px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
    }
    #reply {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>AI Chat</h2>

<textarea id="input" placeholder="输入内容..."></textarea>
<br/>
<button onclick="send()">发送</button>

<div id="reply"></div>

<script>
async function send() {
  const text = document.getElementById("input").value;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await response.json();
  document.getElementById("reply").innerText = data.reply;
}
</script>

</body>
</html>
